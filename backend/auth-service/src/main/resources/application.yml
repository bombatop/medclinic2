server:
  port: 8082

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5433/auth_service_db
    username: auth_user
    password: auth_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        admin-security-events:
          destination: admin-security-events

jwt:
  # Set JWT_SECRET in the environment (see infrastructure/.env.example). Same value as api-gateway.
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000 # 30 minutes
  refresh-token-expiration: 1800000 # 30 minutes (idle logout: both expire together)
  # Override with env JWT_REFRESH_COOKIE_SECURE=true when the auth API is only served over HTTPS.
  refresh-cookie-secure: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
